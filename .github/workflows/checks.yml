name: Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs when a branch is pushed twice in quick succession.
concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (check + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Unit tests
        run: npm test

  backend:
    name: Backend (fmt + clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # Tauri 2 on Linux pulls in webkit2gtk-4.1 (Ubuntu 24.04+) and a few
      # X11/glib helpers via its build deps. Required for `cargo check`,
      # `cargo clippy`, and `cargo test` to compile the lib crate.
      - name: Install Tauri Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Format check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Tests
        working-directory: src-tauri
        run: cargo test
